<html lang="pt-br">

<script>

if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)
}(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');

// USER ID
function gerarId(){
  const chars='abcdefghijklmnopqrstuvwxyz0123456789'
  let id=''
  for(let i=0;i<13;i++){
    id+=chars.charAt(Math.floor(Math.random()*chars.length))
  }
  return id
}

function getUserId(){
  let id=localStorage.getItem('user_id')
  if(!id){
    id=gerarId()
    localStorage.setItem('user_id',id)
  }
  return id
}

const userId=getUserId()

fbq('init','799819532599997',{external_id:userId})
fbq('track','PageView',{external_id:userId})
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  height:100vh;
  background:#000;
}
</style>

</head>

<body>

<script>
(function(){

function track(e,d={}){
  fbq('trackCustom',e,{...d,external_id:userId})
}

// PARAMS
const params=new URLSearchParams(window.location.search)
let LINK=null,UC=null

const raw=params.get("dest")

if(raw && raw.includes("|||")){
  const p=raw.split("|||")
  LINK=p[0]
  UC=p[1]
}else{
  LINK=params.get("dest")
  UC=params.get("uc")
}

if(!LINK||!UC){
  throw new Error("Parâmetros inválidos")
}

// TEMPO
let tempo=0
const tempoInterval=setInterval(()=>{
  tempo++
  if(tempo>=5){
    clearInterval(tempoInterval)
  }
},100)

// VELOCIDADE
function classificar(mbps){
  if(mbps<=1)return 1
  if(mbps<=5)return 2
  if(mbps<=10)return 3
  if(mbps<=20)return 4
  return 5
}

let velocidade=null

async function medirVelocidade(){
  try{
    const start=performance.now()
    const res=await fetch("https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js",{cache:"no-store"})
    const blob=await res.blob()
    const duration=(performance.now()-start)/1000
    const bits=blob.size*8
    velocidade=(bits/duration)/(1024*1024)
  }catch(e){}
}

// BATERIA + CARREGANDO
async function medirBateria(){
  try{
    const bat=await navigator.getBattery()
    const pct=Math.round(bat.level*10)
    const nivel = pct<2 ? "BL" : "B"+pct
    const carregando = bat.charging ? "C1" : "C0"
    return nivel+carregando
  }catch(e){
    return ""
  }
}

// TEMA
function medirTema(){
  return window.matchMedia('(prefers-color-scheme: dark)').matches?"D":"L"
}

// TELA
function medirTela(){
  const w=window.screen.width
  if(w<480)return "S1"
  if(w<768)return "S2"
  if(w<1024)return "S3"
  return "S4"
}

// ORIGEM
function medirOrigem(){
  const ref=document.referrer||""
  const ua=navigator.userAgent||""

  if(ua.includes("Instagram"))return "IG"
  if(ua.includes("FBAN")||ua.includes("FBAV"))return "FB"
  if(ua.includes("TikTok"))return "TK"
  if(ref.includes("google"))return "GG"
  if(ref==="")return "DR"
  return "OT"
}

// RAM
function medirRAM(){
  const ram=navigator.deviceMemory||0
  if(ram<=2)return "R1"
  if(ram<=4)return "R2"
  if(ram<=8)return "R3"
  return "R4"
}

// GIRO
function medirGyro(){
  return typeof DeviceMotionEvent!=="undefined"?"G1":"G0"
}

// VIBRAÇÃO
function medirVibracao(){
  return navigator.vibrate?"V1":"V0"
}

// DISPOSITIVO (NOVO)
function medirDispositivo(){
  const ua = navigator.userAgent || ""
  if(/android/i.test(ua)) return "A"
  if(/iphone|ipad|ipod/i.test(ua)) return "I"
  return "O"
}

// REDIRECT
async function iniciar(){

  const [bat] = await Promise.all([
    medirBateria(),
    medirVelocidade()
  ])

  const tema=medirTema()
  const tela=medirTela()
  const origem=medirOrigem()
  const ram=medirRAM()
  const gyro=medirGyro()
  const vib=medirVibracao()
  const device=medirDispositivo()

  setTimeout(()=>{

    const tempoTag="T"+tempo
    const velTag=velocidade?"V"+classificar(velocidade):"V3"

    let baseUC=UC.replace(/[^a-zA-Z0-9]/g,"").slice(0,20)

    let finalUC=(
      baseUC+
      tempoTag+
      velTag+
      bat+
      tema+
      tela+
      origem+
      ram+
      gyro+
      vib+
      device
    ).replace(/[^a-zA-Z0-9]/g,"").slice(0,48)

    const url=`https://shopee-utm-tracker.onrender.com/?link=${encodeURIComponent(LINK)}&uc=${finalUC}`

    window.location.href=url

  },100)

}

iniciar()

})();
</script>

</body>
</html>
